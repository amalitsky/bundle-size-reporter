name: On Package Release Tag

on:
  push:
    tags:
      - '@bundle-size-reporter/*'
  workflow_dispatch:

concurrency:
  group: new-release-tag-${{ github.sha }}
  cancel-in-progress: true
  # assuming that one commit can release multiple packages

jobs:
  setup:
    name: NPM install & cache

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.node_version }}

      - name: node_modules cache
        id: node-modules-cache
        uses: actions/cache@v5
        env:
          cache_name: node-modules-npm
          cache_key: ${{ vars.node_version }}-${{ hashFiles('package-lock.json') }}
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-${{ env.cache_name }}-${{ env.cache_key }}
          restore-keys: ${{ runner.os }}-${{ env.cache_name }}-

      - name: NPM install
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

  publish:
    name: Publish updated package(s)

    runs-on: ubuntu-latest

    needs: setup

    # id-token: write is required to publish with npm provenance;
    # contents: read is needed for checkout once a permissions block is set
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: ${{ vars.node_version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Restore node_modules from cache
        uses: actions/cache@v5
        env:
          cache_name: node-modules-npm
          cache_key: ${{ vars.node_version }}-${{ hashFiles('package-lock.json') }}
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-${{ env.cache_name }}-${{ env.cache_key }}

      - name: Verify dependency signatures
        run: npm audit signatures

        # build the whole workspace first (topological order) so a downstream
        # package (e.g. cli) can resolve an already-published dependency (core)
        # whose prepack won't run when it isn't part of this publish
      - name: Build packages
        run: npm run build

      - name: Publish
        run: npm run lerna:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload lerna log
        uses: actions/upload-artifact@v7
        with:
          name: lerna-log
          path: lerna-debug.log
          retention-days: 7
